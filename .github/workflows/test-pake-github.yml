name: Build Pake - Test GitHub

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install System Dependencies
        run: |
          echo "🔧 Installing system dependencies for Ubuntu 24.04..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-0 \
            libwebkit2gtk-4.1-0 \
            libappindicator3-1 \
            librsvg2-common \
            libxdo-dev \
            wget \
            ca-certificates \
            libx11-xcb1 \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libasound2 || {
            echo "⚠️ Some packages may not be available, trying fallback..."
            sudo apt-get install -y -qq \
              libgtk-3-0 \
              libwebkit2gtk-4.0-37 \
              libappindicator3-1 \
              librsvg2-common \
              libxdo-dev
          }
          echo "✅ Dependencies installed"
          
      - name: Install Pake CLI
        run: |
          echo "📦 Installing Pake CLI..."
          npm install -g pake-cli@latest
          echo "✅ Pake CLI installed"
          pake --version
      
      - name: Build GitHub App
        run: |
          echo "🚀 Building GitHub.com app..."
          echo "URL: https://github.com"
          echo "Size: 1200x800"
          echo ""
          
          # Create output directory
          mkdir -p ./output
          
          # Build with pake
          pake "https://github.com" \
            --name "GitHub" \
            --width 1200 \
            --height 800 \
            --output ./output || {
            echo "❌ Pake build failed!"
            echo "Checking output directory..."
            ls -la ./output/ 2>&1 || echo "No output directory"
            exit 1
          }
          
          echo ""
          echo "✅ Build complete!"
          echo "Output files:"
          ls -lh ./output/
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHub-app
          path: ./output/
