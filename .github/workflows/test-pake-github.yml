name: Build Pake - Test GitHub

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libwebkit2gtk-4.0-37 \
            libappindicator3-1 \
            librsvg2-common \
            libxdo-dev
          
      - name: Install Pake CLI
        run: npm install -g pake-cli
      
      - name: Build GitHub App
        run: |
          echo "Building GitHub.com app..."
          pake https://github.com --name GitHub --width 1200 --height 800
          ls -lh ./output/
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHub-app
          path: ./output/
