name: Build Pake - Pitch Vercel

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libwebkit2gtk-4.0-37 \
            libappindicator3-1 \
            librsvg2-common \
            libxdo-dev
      
      - name: Install Pake CLI
        run: npm install -g pake-cli
      
      - name: Build Pitch Vercel App
        run: |
          echo "Building: Pitch Vercel"
          echo "URL: https://pitch-easy-wp.vercel.app/"
          pake "https://pitch-easy-wp.vercel.app/" --name PitchVercel --width 1400 --height 900
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitchVercel-app
          path: ./output/
