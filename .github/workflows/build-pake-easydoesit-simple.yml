name: Build Pake - EasyDoesIt

on:
  workflow_dispatch:
    inputs:
      url:
        description: URL
        required: true
        default: 'https://easydoesit.de'
      name:
        description: Name
        required: true
        default: 'EasyDoesIt'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install System Dependencies
        run: |
          echo "🔧 Installing system dependencies..."
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libwebkit2gtk-4.0-37 \
            libappindicator3-1 \
            librsvg2-common \
            libxdo-dev \
            wget \
            ca-certificates
          echo "✅ Dependencies installed"
      
      - name: Install pake-cli
        run: |
          echo "📦 Installing Pake CLI..."
          npm install -g pake-cli@latest
          echo "✅ Pake CLI installed"
          pake --version
      
      - name: Build
        run: |
          echo "🚀 Building: ${{ inputs.name }}"
          echo "URL: ${{ inputs.url }}"
          echo ""
          
          # Create output directory
          mkdir -p ./output
          
          # Build with pake
          pake "${{ inputs.url }}" \
            --name "${{ inputs.name }}" \
            --output ./output || {
            echo "❌ Pake build failed!"
            echo "Checking output directory..."
            ls -la ./output/ 2>&1 || echo "No output directory"
            exit 1
          }
          
          echo ""
          echo "✅ Build complete!"
          echo "Output files:"
          ls -lh ./output/
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}-app
          path: ./output/
          retention-days: 30
          if-no-files-found: error
