name: Build Pake App - EasyDoesIt

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: true
        default: 'https://easydoesit.de'
      name:
        description: 'App Name'
        required: true
        default: 'EasyDoesIt'
      width:
        description: 'Window Width'
        required: false
        default: '1400'
      height:
        description: 'Window Height'
        required: false
        default: '900'

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Pake CLI
        run: |
          echo "Installing Pake CLI..."
          npm install -g pake-cli@latest
          pake --version
          echo "Pake installed successfully!"
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libwebkit2gtk-4.0-37 \
            libappindicator3-1 \
            librsvg2-common \
            libxdo-dev \
            wget \
            ca-certificates
          echo "System dependencies installed"
      
      - name: Build App
        run: |
          echo "Building: ${{ inputs.name }}"
          echo "URL: ${{ inputs.url }}"
          echo "Size: ${{ inputs.width }}x${{ inputs.height }}"
          
          pake "${{ inputs.url }}" \
            --name "${{ inputs.name }}" \
            --width ${{ inputs.width }} \
            --height ${{ inputs.height }}
          
          echo "Build complete!"
          ls -la ./output/
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}-app
          path: ./output/
          retention-days: 30
      
      - name: Build Summary
        run: |
          echo "✅ BUILD SUCCESSFUL!"
          echo "App: ${{ inputs.name }}"
          echo "URL: ${{ inputs.url }}"
          echo "Download artifact from Actions tab"
