name: Build Pake App - EasyDoesIt

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: true
        default: 'https://easydoesit.de'
      name:
        description: 'App Name'
        required: true
        default: 'EasyDoesIt'
      width:
        description: 'Window Width'
        required: false
        default: '1400'
      height:
        description: 'Window Height'
        required: false
        default: '900'

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          echo "Installing pake-cli..."
          npm install -g pake-cli@latest
          echo "Verifying installation..."
          pake --version || exit 1
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
      
      - name: Build Pake App
        run: |
          echo "==================================="
          echo "Building Pake App"
          echo "==================================="
          echo "Name: ${{ inputs.name }}"
          echo "URL: ${{ inputs.url }}"
          echo "Size: ${{ inputs.width }}x${{ inputs.height }}"
          echo "==================================="
          
          # Try to build
          pake "${{ inputs.url }}" \
            --name "${{ inputs.name }}" \
            --width "${{ inputs.width }}" \
            --height "${{ inputs.height }}" \
            --hide-title-bar \
            -o ./output
          
          echo "==================================="
          echo "Build completed!"
          echo "==================================="
          
          # List output files
          ls -la ./output/ || echo "No output directory found"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}-app
          path: ./output/
          retention-days: 30
          if-no-files-found: error
      
      - name: Build summary
        run: |
          echo "## ✅ Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**App:** ${{ inputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ inputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ~5MB" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the artifact from the Actions tab!" >> $GITHUB_STEP_SUMMARY
